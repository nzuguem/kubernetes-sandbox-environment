version: 3


tasks:
  crossplane-install:
    desc: Install Crossplane Operator.
    cmds:
      - helm repo add crossplane-stable https://charts.crossplane.io/stable
      - helm repo update crossplane-stable
      - helm upgrade --install crossplane
        --namespace crossplane-system
        --create-namespace crossplane-stable/crossplane

  crossplane-uninstall:
    desc: UnInstall Crossplane Operator.
    cmd: helm del -n crossplane-system crossplane

  floci-install:
    desc: Install Floci AWS emulator (replaces LocalStack).
    cmds:
      - helm upgrade --install floci
        --namespace default
        aws/floci/chart
        -f aws/floci/helm.values.yml
      - mkdir -p $HOME/.aws && cp aws/config/* $HOME/.aws

  floci-uninstall:
    desc: Uninstall Floci AWS emulator.
    cmds:
      - helm del floci
      - rm -Rf $HOME/.aws

  localstack-install:
    desc: Install Localstack Operator (deprecated - use floci-install instead).
    cmds:
      - helm repo add localstack-charts https://localstack.github.io/helm-charts
      - helm repo update localstack-charts
      - helm upgrade --install localstack  localstack-charts/localstack -f aws/helm.values.yml
      - mkdir -p $HOME/.aws && cp aws/config/* $HOME/.aws

  localstack-uninstall:
    desc: Uninstall Localstack Operator.
    cmds:
      - helm del localstack
      - rm -Rf $HOME/.aws
