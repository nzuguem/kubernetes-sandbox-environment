apiVersion: v1
kind: Service
metadata:
  name: {{ include "floci.fullname" . }}
  labels:
    {{- include "floci.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 4566
      protocol: TCP
      name: http
  selector:
    {{- include "floci.selectorLabels" . | nindent 4 }}
