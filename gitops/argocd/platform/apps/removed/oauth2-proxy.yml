apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oauth2-proxy
  namespace: argocd-system
spec:
  project: platform
  destination:
    namespace: oauth2-proxy-system
    name: in-cluster
  sources:
    - repoURL: https://github.com/nzuguem/kubernetes-sandbox-environment
      targetRevision: main
      ref: values
    - chart: oauth2-proxy
      repoURL: https://oauth2-proxy.github.io/manifests
      targetRevision: 10.1.4
      helm:
        valueFiles:
        - $values/security/oauth2-proxy/helm.values.yml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
